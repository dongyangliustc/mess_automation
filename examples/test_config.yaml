# Test Configuration for MESS Automation
# Testing with three Gaussian output files

# Input/Output settings
input:
  files:
    - "examples/example_data/reactant.out"
    - "examples/example_data/ts.out"
    - "examples/example_data/product.out"

output:
  mess_input: "test_mess_input.inp"
  log_file: "test_processing.log"

# Quantum chemistry settings
quantum:
  Frequency_factor: 0.9480
  zpe_factor: 0.971
  geometry_units: "angstrom"
  frequency_units: "1/cm"
  energy_units: "kcal/mol"

# MESS global settings
mess_global:
  temperature_list: [300, 400, 500, 600, 700, 800, 900, 1000]
  pressure_list: [1.0 ]
  energy_step_over_temperature: 0.2
  excess_energy_over_temperature: 50
  model_energy_limit: 400
  calculation_method: "direct"
  well_cutoff: 20

# Reaction network for testing
reaction_network:
  Energy_baseline: -418.4407413  # Hartree，需要包含zpe能量
  species:
    - name: "R"
      type: "well"
      gaussian_file: "examples/example_data/reactant.out"
      symmetry_factor: 0.5
      EleEnergy: -418.660364      # ← Hartree，电子能量
    
    - name: "TS"
      type: "barrier"
      gaussian_file: "examples/example_data/ts.out"
      symmetry_factor: 0.5
      EleEnergy: -418.619538
      from_species: "R"
      to_species: "P"
    
    - name: "P"
      type: "well"
      gaussian_file: "examples/example_data/product.out"
      symmetry_factor: 0.5
      EleEnergy: -418.6271712

# Processing options
processing:
  skip_unconverged: true
  validate_frequencies: true
  create_backups: false
  verbose: true
